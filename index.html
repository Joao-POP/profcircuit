<!doctype html>

<html>
    <head>
        <meta charset="UTF-8"/>
        <script src="wasm_exec.js"></script>
        <script>
            const go = new Go();

            WebAssembly.instantiateStreaming(fetch("profcircuit.wasm"), go.importObject).then((result) => {
                go.run(result.instance);
            });
        </script>
        <link href="styles/style.css" rel="stylesheet" />
        <title>Profcircuit - Circuit design and reverse engineering</title>
    </head>
    <body>
        <nav class="toolbar">
            <button class="toolbar-submenu" type="button">Add</button>
            <button class="toolbar-submenu" type="button">Edit</button>
            <button class="toolbar-submenu" type="button">View</button>
            <button class="toolbar-submenu" type="button">Simulate</button>
        </nav>
    </body>
</html>
